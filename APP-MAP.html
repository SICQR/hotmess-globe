<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOTMESS App Map — Complete Architecture</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #050507;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
  }

  /* ── Controls ─────────────────────────────────────────────────── */
  #controls {
    position: fixed; top: 0; left: 0; right: 0; z-index: 999;
    background: rgba(5,5,7,0.92); backdrop-filter: blur(16px);
    border-bottom: 1px solid rgba(200,150,44,0.15);
    padding: 12px 20px; display: flex; align-items: center; gap: 16px;
    height: 52px;
  }
  #controls h1 {
    font-size: 14px; font-weight: 900; letter-spacing: 0.15em; text-transform: uppercase;
  }
  #controls h1 span { color: #C8962C; }
  #controls .legend { display: flex; gap: 14px; margin-left: auto; font-size: 11px; }
  #controls .legend .dot {
    width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 4px; vertical-align: middle;
  }
  #controls button {
    background: rgba(200,150,44,0.15); border: 1px solid rgba(200,150,44,0.3);
    color: #C8962C; font-size: 11px; font-weight: 700; padding: 5px 12px;
    border-radius: 6px; cursor: pointer; letter-spacing: 0.05em;
  }
  #controls button:hover { background: rgba(200,150,44,0.25); }

  /* ── Canvas ───────────────────────────────────────────────────── */
  #canvas {
    position: absolute; top: 52px; left: 0; right: 0; bottom: 0;
    overflow: hidden; cursor: grab;
  }
  #canvas:active { cursor: grabbing; }
  #world {
    position: absolute; transform-origin: 0 0;
    /* Will be translated/scaled via JS */
  }

  /* ── Nodes ────────────────────────────────────────────────────── */
  .node {
    position: absolute; border-radius: 10px; padding: 10px 14px;
    font-size: 11px; font-weight: 600; cursor: pointer;
    border: 1px solid rgba(255,255,255,0.08);
    transition: box-shadow 0.2s, border-color 0.2s, transform 0.15s;
    user-select: none; min-width: 120px; text-align: center;
  }
  .node:hover { transform: scale(1.04); z-index: 50; }
  .node.highlighted {
    box-shadow: 0 0 20px rgba(200,150,44,0.4);
    border-color: #C8962C !important;
    z-index: 100;
  }
  .node .label { font-weight: 800; font-size: 12px; margin-bottom: 2px; }
  .node .sub { font-size: 9px; opacity: 0.5; font-weight: 500; }
  .node .route { font-size: 8px; opacity: 0.35; font-family: monospace; margin-top: 3px; }
  .node .badge {
    position: absolute; top: -6px; right: -6px; font-size: 8px; font-weight: 900;
    padding: 2px 5px; border-radius: 8px; letter-spacing: 0.05em;
  }

  /* Status colors */
  .status-ok { background: rgba(48,209,88,0.08); border-color: rgba(48,209,88,0.25); }
  .status-ok .label { color: #30D158; }
  .status-broken { background: rgba(255,59,48,0.08); border-color: rgba(255,59,48,0.3); }
  .status-broken .label { color: #FF3B30; }
  .status-stub { background: rgba(255,204,0,0.06); border-color: rgba(255,204,0,0.2); }
  .status-stub .label { color: #FFCC00; }
  .status-gold { background: rgba(200,150,44,0.1); border-color: rgba(200,150,44,0.3); }
  .status-gold .label { color: #C8962C; }

  /* Special node types */
  .node.tab-node {
    background: rgba(200,150,44,0.12); border: 2px solid rgba(200,150,44,0.4);
    min-width: 100px;
  }
  .node.tab-node .label { color: #C8962C; font-size: 14px; }
  .node.boot-node { min-width: 110px; }
  .node.sheet-node { min-width: 105px; font-size: 10px; }
  .node.api-node {
    background: rgba(0,194,224,0.06); border-color: rgba(0,194,224,0.2);
    font-family: monospace; font-size: 9px; min-width: 90px;
  }
  .node.api-node .label { color: #00C2E0; font-size: 10px; }

  /* ── Section headers ──────────────────────────────────────────── */
  .section-label {
    position: absolute; font-size: 9px; font-weight: 900;
    letter-spacing: 0.3em; text-transform: uppercase; opacity: 0.2;
    user-select: none; pointer-events: none;
  }

  /* ── Arrows (SVG lines) ──────────────────────────────────────── */
  svg.arrows {
    position: absolute; top: 0; left: 0; pointer-events: none;
    overflow: visible;
  }
  svg.arrows line, svg.arrows path {
    stroke-width: 1.2; fill: none;
  }
  svg.arrows .arrow-ok { stroke: rgba(48,209,88,0.3); }
  svg.arrows .arrow-gold { stroke: rgba(200,150,44,0.25); }
  svg.arrows .arrow-broken { stroke: rgba(255,59,48,0.25); stroke-dasharray: 4 3; }
  svg.arrows .arrow-stub { stroke: rgba(255,204,0,0.2); stroke-dasharray: 4 3; }
  svg.arrows .arrow-dim { stroke: rgba(255,255,255,0.06); }
  svg.arrows .highlighted-arrow { stroke-width: 2.5; opacity: 1 !important; }
  svg.arrows marker path { fill: rgba(200,150,44,0.4); }

  /* ── Tooltip ──────────────────────────────────────────────────── */
  #tooltip {
    position: fixed; z-index: 9999; display: none;
    background: #1C1C1E; border: 1px solid rgba(200,150,44,0.3);
    border-radius: 8px; padding: 10px 14px; max-width: 280px;
    font-size: 11px; line-height: 1.5; pointer-events: none;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  }
  #tooltip .tt-title { font-weight: 800; color: #C8962C; margin-bottom: 4px; }
  #tooltip .tt-body { color: rgba(255,255,255,0.6); }
  #tooltip .tt-connections { margin-top: 6px; font-size: 10px; color: rgba(255,255,255,0.35); }

  /* ── Minimap ──────────────────────────────────────────────────── */
  #minimap {
    position: fixed; bottom: 16px; right: 16px; z-index: 998;
    width: 180px; height: 120px; background: rgba(28,28,30,0.9);
    border: 1px solid rgba(200,150,44,0.2); border-radius: 8px;
    overflow: hidden;
  }
  #minimap canvas { width: 100%; height: 100%; }
  #minimap-viewport {
    position: absolute; border: 1px solid #C8962C; pointer-events: none;
    border-radius: 2px;
  }
</style>

// ═══════════════════════════════════════════════════════════════════════════════
// RENDER ENGINE
// ═══════════════════════════════════════════════════════════════════════════════

const world = document.getElementById('world');
const canvas = document.getElementById('canvas');
const tooltip = document.getElementById('tooltip');

let scale = 0.85;
let panX = 20, panY = 20;
let dragging = false, dragStartX = 0, dragStartY = 0;
let selectedNode = null;
let showAllArrows = false;

// Build node lookup
const nodeMap = {};
NODES.forEach(n => { nodeMap[n.id] = n; });

// Build adjacency lists
const connectionsFrom = {};
const connectionsTo = {};
CONNECTIONS.forEach(c => {
  if (!connectionsFrom[c.from]) connectionsFrom[c.from] = [];
  if (!connectionsTo[c.to]) connectionsTo[c.to] = [];
  connectionsFrom[c.from].push(c);
  connectionsTo[c.to].push(c);
});

function getStatusClass(status) {
  const map = { ok: 'status-ok', broken: 'status-broken', stub: 'status-stub', gold: 'status-gold' };
  return map[status] || 'status-ok';
}

function getTypeClass(type) {
  const map = { tab: 'tab-node', boot: 'boot-node', sheet: 'sheet-node', api: 'api-node' };
  return map[type] || '';
}

function getBadge(status) {
  if (status === 'broken') return '<span class="badge" style="background:#FF3B30;color:#fff">BROKEN</span>';
  if (status === 'stub')   return '<span class="badge" style="background:#FFCC00;color:#000">STUB</span>';
  return '';
}

// Render all nodes
function renderNodes() {
  NODES.forEach(n => {
    const div = document.createElement('div');
    div.className = `node ${getStatusClass(n.status)} ${getTypeClass(n.type)}`;
    div.id = `node-${n.id}`;
    div.style.left = n.x + 'px';
    div.style.top = n.y + 'px';
    div.innerHTML = `
      <div class="label">${n.label}</div>
      <div class="sub">${n.sub}</div>
      ${n.route ? `<div class="route">${n.route}</div>` : ''}
      ${getBadge(n.status)}
    `;
    div.addEventListener('click', (e) => { e.stopPropagation(); selectNode(n.id); });
    div.addEventListener('mouseenter', (e) => showTooltip(e, n));
    div.addEventListener('mouseleave', hideTooltip);
    world.appendChild(div);
  });
}

// Render section labels
function renderSections() {
  SECTIONS.forEach(s => {
    const div = document.createElement('div');
    div.className = 'section-label';
    div.style.left = s.x + 'px';
    div.style.top = s.y + 'px';
    div.textContent = s.text;
    world.appendChild(div);
  });
}

// Get center of a node
function nodeCenter(id) {
  const el = document.getElementById(`node-${id}`);
  if (!el) return { x: 0, y: 0 };
  const n = nodeMap[id];
  return { x: n.x + el.offsetWidth / 2, y: n.y + el.offsetHeight / 2 };
}

// Render SVG arrows
let svgEl = null;
function renderArrows(filterIds = null) {
  if (svgEl) svgEl.remove();
  svgEl = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svgEl.classList.add('arrows');
  svgEl.setAttribute('width', '2000');
  svgEl.setAttribute('height', '1600');

  // Arrowhead marker
  const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
  const marker = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
  marker.setAttribute('id', 'arrowhead');
  marker.setAttribute('markerWidth', '8');
  marker.setAttribute('markerHeight', '6');
  marker.setAttribute('refX', '8');
  marker.setAttribute('refY', '3');
  marker.setAttribute('orient', 'auto');
  const mp = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  mp.setAttribute('d', 'M0,0 L8,3 L0,6');
  marker.appendChild(mp);
  defs.appendChild(marker);
  svgEl.appendChild(defs);

  // Force layout recalc
  requestAnimationFrame(() => {
    CONNECTIONS.forEach(c => {
      if (filterIds && !filterIds.has(c.from) && !filterIds.has(c.to)) return;
      const from = nodeCenter(c.from);
      const to = nodeCenter(c.to);
      if (!from.x && !from.y) return;

      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', from.x);
      line.setAttribute('y1', from.y);
      line.setAttribute('x2', to.x);
      line.setAttribute('y2', to.y);
      line.setAttribute('marker-end', 'url(#arrowhead)');

      const styleMap = { ok: 'arrow-ok', gold: 'arrow-gold', broken: 'arrow-broken', stub: 'arrow-stub', dim: 'arrow-dim' };
      line.classList.add(styleMap[c.style] || 'arrow-dim');

      if (filterIds && (filterIds.has(c.from) || filterIds.has(c.to))) {
        line.classList.add('highlighted-arrow');
      }

      svgEl.appendChild(line);
    });
  });

  world.insertBefore(svgEl, world.firstChild);
}

function selectNode(id) {
  // Clear previous
  document.querySelectorAll('.node.highlighted').forEach(el => el.classList.remove('highlighted'));

  if (selectedNode === id) {
    selectedNode = null;
    if (showAllArrows) renderArrows();
    else renderArrows(new Set());
    return;
  }

  selectedNode = id;
  const el = document.getElementById(`node-${id}`);
  if (el) el.classList.add('highlighted');

  // Find all connected nodes
  const connected = new Set([id]);
  (connectionsFrom[id] || []).forEach(c => {
    connected.add(c.to);
    const target = document.getElementById(`node-${c.to}`);
    if (target) target.classList.add('highlighted');
  });
  (connectionsTo[id] || []).forEach(c => {
    connected.add(c.from);
    const target = document.getElementById(`node-${c.from}`);
    if (target) target.classList.add('highlighted');
  });

  renderArrows(connected);
}

function showTooltip(e, n) {
  const tt = tooltip;
  tt.querySelector('.tt-title').textContent = n.label;
  tt.querySelector('.tt-body').textContent = n.info;

  const outgoing = (connectionsFrom[n.id] || []).map(c => `-> ${nodeMap[c.to]?.label || c.to}`);
  const incoming = (connectionsTo[n.id] || []).map(c => `<- ${nodeMap[c.from]?.label || c.from}`);
  const all = [...outgoing, ...incoming];
  tt.querySelector('.tt-connections').textContent = all.length ? `Connections: ${all.join(', ')}` : 'No connections';

  tt.style.display = 'block';
  tt.style.left = Math.min(e.clientX + 12, window.innerWidth - 300) + 'px';
  tt.style.top = Math.min(e.clientY + 12, window.innerHeight - 150) + 'px';
}

function hideTooltip() {
  tooltip.style.display = 'none';
}

// ═══════════════════════════════════════════════════════════════════════════════
// PAN & ZOOM
// ═══════════════════════════════════════════════════════════════════════════════

function updateTransform() {
  world.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
}

canvas.addEventListener('mousedown', (e) => {
  if (e.target.closest('.node')) return;
  dragging = true;
  dragStartX = e.clientX - panX;
  dragStartY = e.clientY - panY;
  // Deselect on background click
  if (selectedNode) {
    selectedNode = null;
    document.querySelectorAll('.node.highlighted').forEach(el => el.classList.remove('highlighted'));
    if (showAllArrows) renderArrows();
    else renderArrows(new Set());
  }
});

canvas.addEventListener('mousemove', (e) => {
  if (!dragging) return;
  panX = e.clientX - dragStartX;
  panY = e.clientY - dragStartY;
  updateTransform();
});

canvas.addEventListener('mouseup', () => { dragging = false; });
canvas.addEventListener('mouseleave', () => { dragging = false; });

canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  const zoomFactor = e.deltaY > 0 ? 0.93 : 1.07;
  const newScale = Math.min(3, Math.max(0.2, scale * zoomFactor));

  // Zoom toward cursor
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  panX = mx - (mx - panX) * (newScale / scale);
  panY = my - (my - panY) * (newScale / scale);
  scale = newScale;
  updateTransform();
}, { passive: false });

// Touch support
let touchStart = null;
let touchDist = null;
canvas.addEventListener('touchstart', (e) => {
  if (e.touches.length === 1) {
    touchStart = { x: e.touches[0].clientX - panX, y: e.touches[0].clientY - panY };
  } else if (e.touches.length === 2) {
    touchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
  }
}, { passive: true });

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (e.touches.length === 1 && touchStart) {
    panX = e.touches[0].clientX - touchStart.x;
    panY = e.touches[0].clientY - touchStart.y;
    updateTransform();
  } else if (e.touches.length === 2 && touchDist) {
    const newDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    const zoomFactor = newDist / touchDist;
    scale = Math.min(3, Math.max(0.2, scale * zoomFactor));
    touchDist = newDist;
    updateTransform();
  }
}, { passive: false });

canvas.addEventListener('touchend', () => { touchStart = null; touchDist = null; });

function resetView() {
  scale = 0.85; panX = 20; panY = 20;
  updateTransform();
  selectedNode = null;
  document.querySelectorAll('.node.highlighted').forEach(el => el.classList.remove('highlighted'));
  if (showAllArrows) renderArrows();
  else renderArrows(new Set());
}

function toggleAllConnections() {
  showAllArrows = !showAllArrows;
  if (showAllArrows) {
    renderArrows();
  } else {
    renderArrows(new Set());
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════════════════

renderNodes();
renderSections();
// Start with arrows hidden — click a node to see its connections
renderArrows(new Set());
updateTransform();
</script>
</body>
</html>
