name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck-build:
    name: Lint → Typecheck → Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

  e2e:
    name: E2E Smoke Tests
    runs-on: ubuntu-latest
    needs: lint-typecheck-build
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Build for preview
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Serve preview + run E2E
        run: npx vite preview --port 4173 &
             sleep 3 &&
             npx playwright test --reporter=list
        env:
          # GitHub repo → Settings → Secrets and variables → Actions
          # Required secrets:
          # VITE_SUPABASE_URL = https://rfoftonnlwudilafhfkl.supabase.co
          # VITE_SUPABASE_ANON_KEY = (Supabase dashboard → Settings → API → anon key)
          # ── HOW TO ADD SECRETS ─────────────────────────────────────────────────────
          # Go to: GitHub repo → Settings → Secrets and variables → Actions
          # Click "New repository secret" for each of the following:
          #
          #   VITE_SUPABASE_URL          https://klsywpvncqqglhnhrjbh.supabase.co
          #   VITE_SUPABASE_ANON_KEY     <anon key — Supabase dashboard → Project Settings → API → anon/public>
          #   TEST_USER_A_EMAIL          test-red@hotmessldn.com
          #   TEST_USER_A_PASSWORD       Hotmess2026!
          #   TEST_USER_B_EMAIL          test-blue@hotmessldn.com
          #   TEST_USER_B_PASSWORD       Hotmess2026!
          #
          # Without VITE_SUPABASE_ANON_KEY + TEST_USER_A_* the auth E2E tests
          # will skip (E2E_AUTH_CONFIGURED = false) rather than hard-fail.
          # ──────────────────────────────────────────────────────────────────────────
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          TEST_USER_A_EMAIL: ${{ secrets.TEST_USER_A_EMAIL }}
          TEST_USER_A_PASSWORD: ${{ secrets.TEST_USER_A_PASSWORD }}
          TEST_USER_B_EMAIL: ${{ secrets.TEST_USER_B_EMAIL }}
          TEST_USER_B_PASSWORD: ${{ secrets.TEST_USER_B_PASSWORD }}
          BASE_URL: http://localhost:4173

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
