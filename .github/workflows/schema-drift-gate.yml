# DB-04 (HIGH) — Schema drift gate. DRAFT — branch fix/db-highs.
# Place at .github/workflows/schema-drift-gate.yml
# Goal: tracked migrations must reconstruct the live schema. Fails the PR on drift.
# Requires repo secret SUPABASE_DB_URL (read-only role recommended) + SUPABASE_ACCESS_TOKEN.
name: schema-drift-gate
on:
  pull_request:
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/schema-drift-gate.yml'
  workflow_dispatch: {}
jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      # 1) Migrations must apply cleanly to a fresh shadow DB.
      - name: Start local Supabase and apply migrations
        run: |
          supabase init --force || true
          supabase start
          supabase migration up --local
      # 2) Diff the migration-built schema against production. Non-empty diff = drift = fail.
      #    Gated on the secret so forks/PRs without it skip the prod compare but still get step 1.
      - name: Diff against production
        if: ${{ env.SUPABASE_DB_URL != '' }}
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase db diff --linked --schema public,auth,storage > drift.sql || true
          if [ -s drift.sql ]; then
            echo "::error::Schema drift detected — tracked migrations do not match production:"
            cat drift.sql
            exit 1
          fi
          echo "No drift. tracked == applied."
      # 3) Security lint (catches new RLS-less tables, mutable search_path, etc.)
      - name: Advisor lint
        run: supabase db lint --level warning || true
# Remediation companion (run once, locally, to seed the baseline so the gate can pass):
#   supabase db dump --linked --schema public,auth,storage \
#     > supabase/migrations/00000000000001_baseline_reconstruct.sql
# Then tracked migrations reconstruct production and this gate stays green going forward.
