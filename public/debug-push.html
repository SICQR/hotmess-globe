<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>HOTMESS — push debug</title>
<style>
  body{font:14px/1.4 -apple-system,system-ui,sans-serif;background:#0a0a0c;color:#eee;padding:16px;margin:0}
  h1{color:#C8962C;font-size:18px;margin:0 0 12px}
  pre{background:#1c1c1e;padding:12px;border-radius:8px;overflow-x:auto;font-size:11px;white-space:pre-wrap;word-wrap:break-word;color:#9ce}
  button{background:#C8962C;color:#000;border:none;padding:14px 24px;border-radius:8px;font-weight:700;font-size:16px;margin:8px 0;width:100%}
  .ok{color:#3f3}.err{color:#f55}.muted{color:#888;font-size:11px}
  .row{margin:8px 0;padding:8px;background:#141416;border-radius:6px}
  .lbl{color:#C8962C;font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.05em}
</style></head>
<body>
<h1>HOTMESS — push debug</h1>
<p class="muted">Open this on iPhone PWA. Read each row. Tap subscribe. Screenshot whole page.</p>
<div id="out"></div>
<button id="go">Subscribe + POST</button>
<div id="result"></div>
<script>
const out = document.getElementById('out');
const result = document.getElementById('result');
function row(label, val, cls){
  const d = document.createElement('div');
  d.className = 'row';
  d.innerHTML = '<div class="lbl">'+label+'</div><pre class="'+(cls||'')+'">'+
    (typeof val==='object'?JSON.stringify(val,null,2):String(val))+'</pre>';
  out.appendChild(d);
}

(async () => {
  row('user agent', navigator.userAgent);
  row('display mode standalone', window.matchMedia('(display-mode: standalone)').matches);
  row('serviceWorker supported', 'serviceWorker' in navigator);
  row('PushManager supported', 'PushManager' in window);
  row('Notification permission', typeof Notification!=='undefined' ? Notification.permission : 'n/a');

  // localStorage scan for supabase
  const lsKeys = [];
  let foundToken = null;
  try {
    for (const k of Object.keys(localStorage)) {
      if (k.startsWith('sb-') || k.includes('supabase')) {
        const v = localStorage.getItem(k);
        let parsed = null;
        try { parsed = JSON.parse(v); } catch {}
        const hasToken = !!(parsed?.access_token || parsed?.currentSession?.access_token);
        lsKeys.push({ key: k, len: v?.length, has_token: hasToken });
        if (hasToken && !foundToken) {
          foundToken = parsed.access_token || parsed.currentSession.access_token;
        }
      }
    }
  } catch (e) {
    row('localStorage error', e.message, 'err');
  }
  row('localStorage sb keys', lsKeys);
  row('access_token found', !!foundToken, foundToken ? 'ok' : 'err');

  if ('serviceWorker' in navigator) {
    try {
      const reg = await navigator.serviceWorker.ready;
      row('SW scope', reg.scope, 'ok');
      const existing = await reg.pushManager.getSubscription();
      row('existing push subscription', existing ? { endpoint_host: existing.endpoint.match(/\\/\\/([^\\/]+)/)?.[1] } : null);
    } catch (e) {
      row('SW error', e.message, 'err');
    }
  }
})();

document.getElementById('go').addEventListener('click', async () => {
  result.innerHTML = '<div class="row"><div class="lbl">working...</div></div>';
  const log = (l,v,cls) => {
    const d = document.createElement('div');
    d.className = 'row';
    d.innerHTML = '<div class="lbl">'+l+'</div><pre class="'+(cls||'')+'">'+
      (typeof v==='object'?JSON.stringify(v,null,2):String(v))+'</pre>';
    result.appendChild(d);
  };
  result.innerHTML = '';
  try {
    if (Notification.permission === 'default') {
      const p = await Notification.requestPermission();
      log('permission after prompt', p);
      if (p !== 'granted') return;
    }
    if (Notification.permission !== 'granted') {
      log('permission denied', Notification.permission, 'err');
      return;
    }
    const reg = await navigator.serviceWorker.ready;
    let sub = await reg.pushManager.getSubscription();
    log('existing sub before subscribe', sub ? { endpoint_host: sub.endpoint.match(/\\/\\/([^\\/]+)/)?.[1] } : null);

    if (!sub) {
      const VAPID = 'BPuEtZn-WTm6lcM7DBnvK0kepsuBmZTcwm1Ip2gdb_Co60s30HnFCfA6JjmI4UvpyOpZ-uRYrjmpcLAJxTAhBHM';
      const padding = '='.repeat((4 - (VAPID.length % 4)) % 4);
      const base64 = (VAPID + padding).replace(/-/g, '+').replace(/_/g, '/');
      const raw = window.atob(base64);
      const bytes = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);
      sub = await reg.pushManager.subscribe({ userVisibleOnly: true, applicationServerKey: bytes });
      log('new subscription created', { endpoint_host: sub.endpoint.match(/\\/\\/([^\\/]+)/)?.[1] }, 'ok');
    }

    const subJson = sub.toJSON();
    log('sub json shape', { has_endpoint: !!subJson.endpoint, has_p256dh: !!subJson.keys?.p256dh, has_auth: !!subJson.keys?.auth });

    let token = null;
    for (const k of Object.keys(localStorage)) {
      if (!k.startsWith('sb-') && !k.includes('supabase')) continue;
      try { const v = JSON.parse(localStorage.getItem(k));
        if (v?.access_token) { token = v.access_token; break; }
        if (v?.currentSession?.access_token) { token = v.currentSession.access_token; break; }
      } catch {}
    }
    log('JWT from localStorage', token ? 'FOUND ('+token.length+' chars)' : 'MISSING', token ? 'ok' : 'err');

    if (!token) { log('cannot POST without token', 'sign in via PWA first', 'err'); return; }

    const res = await fetch('/api/notifications/push-subscribe', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
      body: JSON.stringify({ subscription: subJson, user_agent: navigator.userAgent }),
    });
    const text = await res.text();
    log('POST status', res.status, res.ok ? 'ok' : 'err');
    log('POST response', text, res.ok ? 'ok' : 'err');

  } catch (e) {
    log('exception', { name: e.name, message: e.message, stack: (e.stack||'').slice(0,400) }, 'err');
  }
});
</script></body></html>
