<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" role="img" aria-label="Founder voice placeholder — abstract">
  <title>Founder voice — placeholder (abstract, no face)</title>
  <defs>
    <radialGradient id="glow" cx="0.5" cy="0.6" r="0.7">
      <stop offset="0%"  stop-color="#C8A878" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#9A7020" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#050507" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0D0D0D"/>
      <stop offset="100%" stop-color="#050507"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="1200" fill="url(#bg)"/>
  <!-- Warm halo -->
  <rect width="1200" height="1200" fill="url(#glow)"/>
  <!-- Abstract upper-torso silhouette — no facial features, no skin tone. A negative-space figure. -->
  <g transform="translate(600,1100)" fill="#050507" opacity="0.92">
    <!-- shoulders -->
    <path d="M -360 0 C -340 -240 -180 -360 0 -380 C 180 -360 340 -240 360 0 Z"/>
  </g>
  <!-- Suggestion of head as a soft hollow circle (no features) -->
  <circle cx="600" cy="540" r="170" fill="#050507" opacity="0.92"/>
  <circle cx="600" cy="540" r="170" fill="none" stroke="#C8A878" stroke-width="0.8" opacity="0.45"/>
  <!-- Type label -->
  <text x="80" y="80" fill="#C8A878" font-family="'Space Mono','SF Mono',Menlo,monospace" font-size="14" letter-spacing="4" font-weight="700">PLACEHOLDER · FOUNDER VOICE</text>
  <text x="80" y="1140" fill="rgba(242,237,230,0.45)" font-family="'Space Mono','SF Mono',Menlo,monospace" font-size="11" letter-spacing="5">ABSTRACT — NO PORTRAIT, NO FACE</text>
</svg>
