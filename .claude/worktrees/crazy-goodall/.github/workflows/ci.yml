name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Set minimal permissions for all jobs
permissions:
  contents: read

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run ESLint
        run: npm run lint
        continue-on-error: false

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run type checking
        run: npm run typecheck

  build:
    name: Build Application
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build application
        run: npm run build
        env:
          # Note: Add your environment variables as GitHub Secrets
          VITE_BASE44_APP_ID: ${{ secrets.VITE_BASE44_APP_ID }}
          VITE_BASE44_APP_BASE_URL: ${{ secrets.VITE_BASE44_APP_BASE_URL }}
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run npm audit
        run: npm audit --omit=dev --audit-level=moderate
        continue-on-error: false
      
      - name: Check for secrets in code
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || '' }}
          head: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || 'HEAD' }}

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:run
        env:
          CI: true
          VITE_SUPABASE_URL: https://klsywpvncqqglhnhrjbh.supabase.co
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

  e2e-smoke:
    name: E2E Tests
    runs-on: ubuntu-latest
    continue-on-error: false
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify Supabase auth (pre-flight)
        run: |
          node -e "
          // Skip preflight when secrets are not configured — avoids false-positive
          // failures caused by blank credentials being sent to Supabase.
          const email    = process.env.TEST_USER_A_EMAIL    || '';
          const password = process.env.TEST_USER_A_PASSWORD || '';
          const anonKey  = process.env.VITE_SUPABASE_ANON_KEY || '';
          if (!email || !password || !anonKey) {
            console.warn('WARNING: Auth preflight skipped - TEST_USER_A_EMAIL / TEST_USER_A_PASSWORD / VITE_SUPABASE_ANON_KEY not set. Authenticated E2E tests will be skipped.');
            process.exit(0);
          }
          const https = require('https');
          const body = JSON.stringify({ email, password });
          const req = https.request({
            hostname: 'klsywpvncqqglhnhrjbh.supabase.co',
            path: '/auth/v1/token?grant_type=password',
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'apikey': anonKey, 'Content-Length': Buffer.byteLength(body) }
          }, (res) => {
            let data = '';
            res.on('data', d => data += d);
            res.on('end', () => {
              const json = JSON.parse(data);
              if (!json.access_token) { console.error('Auth FAILED - error_code:', json.error_code, 'msg:', json.msg); process.exit(1); }
              else { console.log('Auth OK — user:', json.user?.email); }
            });
          });
          req.on('error', e => { console.error('Network error:', e.message); process.exit(1); });
          req.write(body);
          req.end();
          "
        env:
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          TEST_USER_A_EMAIL: ${{ secrets.TEST_USER_A_EMAIL }}
          TEST_USER_A_PASSWORD: ${{ secrets.TEST_USER_A_PASSWORD }}

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run E2E specs (Chromium only)
        run: |
          npx playwright test \
            e2e/01-boot.spec.ts \
            e2e/02-home.spec.ts \
            e2e/03-pulse.spec.ts \
            e2e/04-ghosted.spec.ts \
            e2e/05-profile.spec.ts \
            e2e/06-safety.spec.ts \
            e2e/07-two-user.spec.ts \
            e2e/08-navigation.spec.ts \
            --project=chromium \
            --reporter=html
        env:
          CI: true
          VITE_SUPABASE_URL: https://klsywpvncqqglhnhrjbh.supabase.co
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          TEST_USER_A_EMAIL: ${{ secrets.TEST_USER_A_EMAIL }}
          TEST_USER_A_PASSWORD: ${{ secrets.TEST_USER_A_PASSWORD }}
          TEST_USER_B_EMAIL: ${{ secrets.TEST_USER_B_EMAIL }}
          TEST_USER_B_PASSWORD: ${{ secrets.TEST_USER_B_PASSWORD }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  all-checks-complete:
    name: All Checks Complete
    runs-on: ubuntu-latest
    needs: [lint, typecheck, build, security, unit-tests, e2e-smoke]
    permissions:
      contents: read

    steps:
      - name: All checks passed
        run: echo "✅ All CI checks passed successfully!"

  deploy-production:
    name: Deploy to Vercel Production
    runs-on: ubuntu-latest
    needs: [lint, typecheck, build, security, unit-tests, e2e-smoke]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    continue-on-error: true
    permissions:
      contents: read
    environment:
      name: production
      url: https://hotmessldn.com
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      
      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      
      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      
      - name: Deploy to Vercel Production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
